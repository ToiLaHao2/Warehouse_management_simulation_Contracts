syntax = "proto3";

package mes;

// Option này rất quan trọng cho tầng Go sau này
option go_package = "github.com/devil/wmss/contracts/mes;mes";

// Dịch vụ Pathfinding (Tìm đường)
service PathfindingService {
  // Định nghĩa một hàm có thể gọi từ xa (RPC - Remote Procedure Call)
  rpc CalculatePath (PathRequest) returns (PathResponse);
}

// Cấu trúc dữ liệu Tọa độ cơ bản
message Point {
  int32 x = 1;
  int32 y = 2;
}

// Request: Dữ liệu yêu cầu tìm đường
message PathRequest {
  string warehouse_id = 1; // Để Python biết lấy bản đồ kho nào từ Redis
  Point start = 2;         // Điểm hiện tại của AGV
  Point end = 3;           // Điểm đến (Docks, Charging...)
}

// Response: Kết quả tìm đường từ MES
message PathResponse {
  repeated Point waypoints = 1; // Danh sách các điểm cần đi qua (Mảng các Point)
  bool success = 2;             // True nếu tìm thấy đường, False nếu bị kẹt cứng
  string message = 3;           // Thông báo lỗi nếu có
}


// Dịch vụ cấp phát vị trí (Slot allocation)
service SlotAllocationService {
  rpc AllocateSlot (SlotAllocationRequest) returns (SlotAllocationResponse);
}

// Request: Dữ liệu yêu cầu cấp phát vị trí
message SlotAllocationRequest {
  string warehouse_id = 1;
  string item_id = 2;
  float length = 3;
  float width = 4;
}

// Response: Kết quả cấp phát vị trí từ MES
message SlotAllocationResponse {
  bool success = 1;
  string slot_id = 2;
  string message = 3;
  string error_code = 4;
}